# ============================================================
# ENDPOINT REGISTRY
# This is the ONLY file you need to edit to add/remove endpoints.
#
# Each entry defines:
#   path        - URL path segment (e.g. "hello" => /hello)
#   method      - HTTP method: GET | POST | PUT | DELETE | PATCH
#   description - Human-readable label (used in Lambda function name)
#   runtime     - Lambda runtime
#   handler     - Lambda handler
#   code        - Inline Lambda code (or swap for S3 reference)
#
# To add a new endpoint, just append a new block following the
# same pattern. No changes needed in template.yaml.
# ============================================================

Endpoints:

  - path: hello
    method: GET
    description: hello-handler
    runtime: python3.12
    handler: index.handler
    code: |
      import json
      def handler(event, context):
          return {
              "statusCode": 200,
              "headers": {"Content-Type": "application/json"},
              "body": json.dumps({"message": "Hello from API GTw R+S"})
          }

  - path: data
    method: POST
    description: data-handler
    runtime: python3.12
    handler: index.handler
    code: |
      import json
      def handler(event, context):
          body = json.loads(event.get("body") or "{}")
          return {
              "statusCode": 200,
              "headers": {"Content-Type": "application/json"},
              "body": json.dumps({"received": body, "status": "ok"})
          }
