AWSTemplateFormatVersion: '2010-09-09'
Description: >
  API Gateway stack. Endpoints are defined in swagger.yaml.
  To add endpoints: edit swagger.yaml and push to master.
  No scripts, no code generation - pure CloudFormation.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  StageName:
    Type: String
    Default: v1

  ApiName:
    Type: String
    Default: my-api

Resources:

  # ── Shared Lambda execution role ─────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-${ApiName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── Lambda: GET /hello ───────────────────────────────────────────────────
  LambdaHello:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${Environment}-hello-handler"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              return {
                  "statusCode": 200,
                  "headers": {"Content-Type": "application/json"},
                  "body": json.dumps({"message": "Hello from API Gateway!"})
              }
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── Lambda: POST /data ───────────────────────────────────────────────────
  LambdaData:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${Environment}-data-handler"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              body = json.loads(event.get("body") or "{}")
              return {
                  "statusCode": 200,
                  "headers": {"Content-Type": "application/json"},
                  "body": json.dumps({"received": body, "status": "ok"})
              }
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── REST API - imports swagger.yaml (cloudformation package uploads it to S3) ──
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${Environment}-${ApiName}"
      Description: !Sub "REST API for ${Environment}"
      EndpointConfiguration:
        Types:
          - REGIONAL
      Body:
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: aws/api-gateway/swagger.yaml
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── Lambda permissions for API Gateway ───────────────────────────────────
  LambdaHelloPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaHello.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/GET/hello"

  LambdaDataPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LambdaData.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/POST/data"

  # ── Deployment ────────────────────────────────────────────────────────────
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    Properties:
      RestApiId: !Ref RestApi

  # ── Stage ─────────────────────────────────────────────────────────────────
  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref StageName
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: 200
          ThrottlingRateLimit: 100
          MetricsEnabled: true
          LoggingLevel: INFO
          DataTraceEnabled: false
      Tags:
        - Key: Environment
          Value: !Ref Environment

Outputs:
  ApiEndpoint:
    Description: Base URL
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"
    Export:
      Name: !Sub "${Environment}-${ApiName}-Endpoint"

  ApiId:
    Value: !Ref RestApi
    Export:
      Name: !Sub "${Environment}-${ApiName}-Id"
