version: 0.2

env:
  variables:
    ENVIRONMENT: "dev"
    ARTIFACT_BUCKET: ""
    DEPLOY_MODULES: ""

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install cfn-lint pyyaml boto3 --quiet

  pre_build:
    commands:
      - echo "==> Environment     $ENVIRONMENT"
      - echo "==> Artifact bucket $ARTIFACT_BUCKET"
      - echo "==> Deploy modules  ${DEPLOY_MODULES:-all enabled}"

  build:
    commands:
      - python pipeline/scripts/deploy_module.py

artifacts:
  files:
    - "**/*"
  discard-paths: no
