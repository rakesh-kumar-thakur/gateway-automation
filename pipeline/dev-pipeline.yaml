AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Development Environment Pipeline - ap-south-1
  Auto-detects changed modules and deploys only those.
  Includes automated testing stages.

Parameters:
  GitHubOwner:
    Type: String
    Description: GitHub repository owner
  GitHubRepo:
    Type: String
    Description: GitHub repository name
  GitHubBranch:
    Type: String
    Default: develop
    Description: Branch to track for dev environment
  GitHubConnectionArn:
    Type: String
    Description: ARN of the CodeStar Connection to GitHub
  GitHubToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: (Optional) GitHub Personal Access Token for API access. Leave empty to use CodeConnections.
  
  # Module-level parameters
  ApiStageName:
    Type: String
    Default: dev
  ApiName:
    Type: String
    Default: dev-api-gateway

Resources:

  # ── Artifact bucket ──────────────────────────────────────────────────────
  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${AWS::AccountId}-dev-pipeline-artifacts"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

  # ── SNS Topic for Notifications (provision for future use) ──────────────
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: dev-pipeline-notifications
      DisplayName: Development Pipeline Notifications
      Tags:
        - Key: Environment
          Value: dev

  # ── SSM Parameters ───────────────────────────────────────────────────────
  SSMEnvironment:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /pipeline/dev/environment
      Type: String
      Value: dev

  SSMArtifactBucket:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /pipeline/dev/artifact_bucket
      Type: String
      Value: !Ref ArtifactBucket

  SSMApiStageName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /pipeline/dev/stage_name
      Type: String
      Value: !Ref ApiStageName

  SSMApiName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /pipeline/dev/api_name
      Type: String
      Value: !Ref ApiName

  SSMNotificationTopic:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /pipeline/dev/notification_topic
      Type: String
      Value: !Ref NotificationTopic
      Description: SNS topic for pipeline notifications (reserved for future use)

  # ── IAM: CodeBuild ───────────────────────────────────────────────────────
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dev-codebuild-deploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Logs
                Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"

              - Sid: Artifacts
                Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:GetBucketVersioning]
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"

              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                Resource: "*"

              - Sid: IAMPassthrough
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:PassRole
                  - iam:TagRole
                Resource: "*"

              - Sid: AllAWSServices
                Effect: Allow
                Action:
                  - lambda:*
                  - apigateway:*
                  - elasticloadbalancing:*
                  - ecs:*
                  - ec2:Describe*
                  - ec2:CreateSecurityGroup
                  - ec2:AuthorizeSecurityGroupIngress
                Resource: "*"

              - Sid: SSM
                Effect: Allow
                Action: [ssm:GetParameter, ssm:GetParameters]
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pipeline/dev/*"

  # ── CodeBuild: Deploy Project ────────────────────────────────────────────
  CodeBuildDeployProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: dev-infra-deploy
      Description: Detects changed modules and deploys them to dev environment
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: dev
          - Name: ARTIFACT_BUCKET
            Value: !Ref ArtifactBucket
          - Name: DEPLOY_MODULES
            Value: ""
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-deploy.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/dev-infra-deploy
      Tags:
        - Key: Environment
          Value: dev

  # ── CodeBuild: API Test Project ──────────────────────────────────────────
  CodeBuildApiTestProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: dev-api-tests
      Description: Runs automated API tests after deployment
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: dev
          - Name: API_ENDPOINT
            Value: ""
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-api-tests.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/dev-api-tests
      Tags:
        - Key: Environment
          Value: dev

  # ── CodeBuild: Integration Test Project ──────────────────────────────────
  CodeBuildIntegrationTestProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: dev-integration-tests
      Description: Runs integration tests after deployment
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: dev
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-integration-tests.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/dev-integration-tests
      Tags:
        - Key: Environment
          Value: dev

  # ── CodeBuild: Load Test Project ─────────────────────────────────────────
  CodeBuildLoadTestProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: dev-load-tests
      Description: Runs load tests after deployment
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: dev
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-load-tests.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/dev-load-tests
      Tags:
        - Key: Environment
          Value: dev

  # ── IAM: CodePipeline ────────────────────────────────────────────────────
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dev-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:GetBucketVersioning]
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action: [codebuild:BatchGetBuilds, codebuild:StartBuild]
                Resource:
                  - !GetAtt CodeBuildDeployProject.Arn
                  - !GetAtt CodeBuildApiTestProject.Arn
                  - !GetAtt CodeBuildIntegrationTestProject.Arn
                  - !GetAtt CodeBuildLoadTestProject.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                  - codeconnections:UseConnection
                Resource: !Ref GitHubConnectionArn

  # ── IAM: Lambda Polling Function ─────────────────────────────────────────
  PollLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dev-pipeline-poll-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PipelineTriggerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codepipeline:StartPipelineExecution
                  - codepipeline:GetPipelineState
                  - codepipeline:ListPipelineExecutions
                Resource: !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}"

  # ── Lambda: Poll for Changes ──────────────────────────────────────────────
  PollLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: dev-pipeline-poll-trigger
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt PollLambdaRole.Arn
      Timeout: 30
      Environment:
        Variables:
          PIPELINE_NAME: !Ref Pipeline
          GITHUB_OWNER: !Ref GitHubOwner
          GITHUB_REPO: !Ref GitHubRepo
          GITHUB_BRANCH: !Ref GitHubBranch
          GITHUB_TOKEN: !Ref GitHubToken
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          import urllib.request
          
          codepipeline = boto3.client('codepipeline')
          
          def get_github_latest_commit():
              """Get latest commit SHA from GitHub API"""
              owner = os.environ['GITHUB_OWNER']
              repo = os.environ['GITHUB_REPO']
              branch = os.environ['GITHUB_BRANCH']
              token = os.environ.get('GITHUB_TOKEN', '')
              
              url = f'https://api.github.com/repos/{owner}/{repo}/branches/{branch}'
              headers = {'Accept': 'application/vnd.github.v3+json'}
              if token:
                  headers['Authorization'] = f'token {token}'
              
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode())
                  return data['commit']['sha']
          
          def lambda_handler(event, context):
              try:
                  pipeline_name = os.environ['PIPELINE_NAME']
                  
                  # Get pipeline state
                  pipeline_state = codepipeline.get_pipeline_state(name=pipeline_name)
                  
                  # Check if pipeline is currently running
                  for stage in pipeline_state['stageStates']:
                      if stage.get('latestExecution', {}).get('status') == 'InProgress':
                          print("Pipeline already running, skipping trigger")
                          return {'statusCode': 200, 'body': 'Pipeline running'}
                  
                  # Get latest commit from GitHub
                  try:
                      github_commit = get_github_latest_commit()
                      print(f"Latest GitHub commit: {github_commit}")
                  except Exception as e:
                      print(f"Error fetching GitHub commit: {str(e)}")
                      return {'statusCode': 500, 'body': f'GitHub API error: {str(e)}'}
                  
                  # Get latest pipeline execution
                  executions = codepipeline.list_pipeline_executions(
                      pipelineName=pipeline_name,
                      maxResults=1
                  )
                  
                  if executions['pipelineExecutionSummaries']:
                      last_execution = executions['pipelineExecutionSummaries'][0]
                      last_commit = None
                      if last_execution.get('sourceRevisions'):
                          last_commit = last_execution['sourceRevisions'][0]['revisionId']
                      
                      # Compare GitHub commit with last pipeline execution
                      if github_commit != last_commit:
                          response = codepipeline.start_pipeline_execution(name=pipeline_name)
                          print(f"New commit detected! GitHub: {github_commit}, Last: {last_commit}")
                          print(f"Pipeline triggered: {response['pipelineExecutionId']}")
                          return {
                              'statusCode': 200,
                              'body': json.dumps({
                                  'message': 'Pipeline triggered - new commit detected',
                                  'executionId': response['pipelineExecutionId'],
                                  'newCommit': github_commit,
                                  'oldCommit': last_commit
                              })
                          }
                      else:
                          print(f"No new commits. GitHub: {github_commit}, Last: {last_commit}")
                          return {'statusCode': 200, 'body': 'No new commits'}
                  
                  # First run - trigger pipeline
                  response = codepipeline.start_pipeline_execution(name=pipeline_name)
                  print(f"First run - Pipeline triggered: {response['pipelineExecutionId']}")
                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'message': 'Pipeline triggered - first run',
                          'executionId': response['pipelineExecutionId']
                      })
                  }
                  
              except Exception as e:
                  print(f'Error: {str(e)}')
                  import traceback
                  traceback.print_exc()
                  return {'statusCode': 500, 'body': json.dumps({'error': str(e)})}

  # ── EventBridge: Schedule Poll Every 2 Minutes ────────────────────────────
  PollScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: dev-pipeline-poll-schedule
      Description: Polls for changes and triggers pipeline every 2 minutes
      ScheduleExpression: rate(2 minutes)
      State: ENABLED
      Targets:
        - Id: PollLambdaTarget
          Arn: !GetAtt PollLambdaFunction.Arn

  # ── Lambda Permission for EventBridge ─────────────────────────────────────
  PollLambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PollLambdaFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt PollScheduleRule.Arn

  # ── IAM: EventBridge → CodePipeline ─────────────────────────────────────
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dev-eventbridge-pipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipelineExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}"

  # ── EventBridge rule: GitHub push → trigger pipeline ────────────────────
  PipelineTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      Name: dev-infra-pipeline-trigger
      Description: Triggers dev pipeline on push to develop branch
      State: ENABLED
      EventPattern:
        source:
          - aws.codeconnections
        detail-type:
          - CodeConnections Source Action State Change
        resources:
          - !Ref GitHubConnectionArn
        detail:
          state:
            - SUCCEEDED
          fullRepositoryName:
            - !Sub "${GitHubOwner}/${GitHubRepo}"
          referenceName:
            - !Ref GitHubBranch
      Targets:
        - Id: TriggerPipeline
          Arn: !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Pipeline}"
          RoleArn: !GetAtt EventBridgeRole.Arn

  # ── CodePipeline ─────────────────────────────────────────────────────────
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: dev-infra-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:

        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Sub "${GitHubOwner}/${GitHubRepo}"
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
                DetectChanges: true
              OutputArtifacts:
                - Name: SourceArtifact

        - Name: Deploy
          Actions:
            - Name: DeployChangedModules
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildDeployProject
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: DeployArtifact

        # Test stage - Optional, won't block deployment
        # Tests may fail if API endpoints don't exist yet
        # Remove this entire stage if you don't want testing
        # - Name: Test
        #   Actions:
        #     - Name: ApiTests
        #       ActionTypeId:
        #         Category: Build
        #         Owner: AWS
        #         Provider: CodeBuild
        #         Version: '1'
        #       Configuration:
        #         ProjectName: !Ref CodeBuildApiTestProject
        #       InputArtifacts:
        #         - Name: SourceArtifact
        #       OutputArtifacts:
        #         - Name: ApiTestArtifact
        #       RunOrder: 1

      Tags:
        - Key: Environment
          Value: dev

  # ── CloudWatch alarm on pipeline failure ─────────────────────────────────
  PipelineFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: dev-infra-pipeline-failure
      AlarmDescription: Fires when dev pipeline execution fails
      Namespace: AWS/CodePipeline
      MetricName: FailedPipelines
      Dimensions:
        - Name: PipelineName
          Value: !Ref Pipeline
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  PipelineName:
    Value: !Ref Pipeline
    Export:
      Name: dev-PipelineName

  PipelineConsoleUrl:
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/${Pipeline}/view"

  ArtifactBucket:
    Value: !Ref ArtifactBucket
    Export:
      Name: dev-PipelineArtifactBucket

  NotificationTopicArn:
    Value: !Ref NotificationTopic
    Export:
      Name: dev-NotificationTopicArn
    Description: SNS topic for pipeline notifications (reserved for future use)

