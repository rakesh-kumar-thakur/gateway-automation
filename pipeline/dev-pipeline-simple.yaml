AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Simplified Development Pipeline - ap-south-1
  Minimal POC version with Source and Deploy stages only.

Parameters:
  GitHubOwner:
    Type: String
    Description: GitHub repository owner
  GitHubRepo:
    Type: String
    Description: GitHub repository name
  GitHubBranch:
    Type: String
    Default: develop
    Description: Branch to track for dev environment
  GitHubConnectionArn:
    Type: String
    Description: ARN of the CodeStar Connection to GitHub
  
  # Module-level parameters
  ApiStageName:
    Type: String
    Default: dev
  ApiName:
    Type: String
    Default: dev-api-gateway

Resources:

  # ── Artifact bucket ──────────────────────────────────────────────────────
  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${AWS::AccountId}-dev-pipeline-artifacts"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

  # ── IAM: CodeBuild ───────────────────────────────────────────────────────
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dev-codebuild-deploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Logs
                Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"

              - Sid: Artifacts
                Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:GetBucketVersioning]
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"

              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                Resource: "*"

              - Sid: IAMPassthrough
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:PassRole
                  - iam:TagRole
                Resource: "*"

              - Sid: AllAWSServices
                Effect: Allow
                Action:
                  - lambda:*
                  - apigateway:*
                  - elasticloadbalancing:*
                  - ecs:*
                  - ec2:Describe*
                  - ec2:CreateSecurityGroup
                  - ec2:AuthorizeSecurityGroupIngress
                Resource: "*"

  # ── CodeBuild: Deploy Project ────────────────────────────────────────────
  CodeBuildDeployProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: dev-infra-deploy
      Description: Deploys infrastructure modules to dev environment
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: dev
          - Name: ARTIFACT_BUCKET
            Value: !Ref ArtifactBucket
          - Name: DEPLOY_MODULES
            Value: ""
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec-deploy.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: /aws/codebuild/dev-infra-deploy
      Tags:
        - Key: Environment
          Value: dev

  # ── IAM: CodePipeline ────────────────────────────────────────────────────
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dev-codepipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:GetBucketVersioning]
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action: [codebuild:BatchGetBuilds, codebuild:StartBuild]
                Resource:
                  - !GetAtt CodeBuildDeployProject.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                  - codeconnections:UseConnection
                Resource: !Ref GitHubConnectionArn

  # ── IAM: EventBridge → CodePipeline ─────────────────────────────────────
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dev-eventbridge-pipeline-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipelineExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:dev-infra-pipeline"

  # ── EventBridge rule: GitHub push → trigger pipeline ────────────────────
  PipelineTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      Name: dev-infra-pipeline-trigger
      Description: Triggers dev pipeline on push to develop branch
      State: ENABLED
      EventPattern:
        source:
          - aws.codeconnections
        detail-type:
          - CodeConnections Repository State Change
        detail:
          event:
            - referenceUpdated
            - referenceCreated
          referenceName:
            - !Ref GitHubBranch
          referenceType:
            - branch
          repositoryName:
            - !Ref GitHubRepo
      Targets:
        - Id: TriggerPipeline
          Arn: !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:dev-infra-pipeline"
          RoleArn: !GetAtt EventBridgeRole.Arn

  # ── CodePipeline ─────────────────────────────────────────────────────────
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: dev-infra-pipeline
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:

        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Sub "${GitHubOwner}/${GitHubRepo}"
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
                DetectChanges: false
              OutputArtifacts:
                - Name: SourceArtifact

        - Name: Deploy
          Actions:
            - Name: DeployInfrastructure
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildDeployProject
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: DeployArtifact

      Tags:
        - Key: Environment
          Value: dev

Outputs:
  PipelineName:
    Value: !Ref Pipeline
    Export:
      Name: dev-PipelineName

  PipelineConsoleUrl:
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/${Pipeline}/view"

  ArtifactBucket:
    Value: !Ref ArtifactBucket
    Export:
      Name: dev-PipelineArtifactBucket

