version: 0.2

# ============================================================================
# API Testing BuildSpec - Automated API endpoint tests
# ============================================================================
# This buildspec runs automated API tests after deployment to verify:
# - API endpoints are accessible
# - Response codes are correct
# - Response payloads are valid
# - Authentication/authorization works

env:
  variables:
    ENVIRONMENT: "dev"
    API_ENDPOINT: ""  # Will be fetched from CloudFormation outputs

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "==> Installing test dependencies..."
      - pip install --quiet requests pytest pytest-html boto3

  pre_build:
    commands:
      - echo "==> Environment $ENVIRONMENT"
      - echo "==> Fetching API endpoint from CloudFormation..."
      - |
        STACK_NAME="${ENVIRONMENT}-api-gateway-stack"
        API_ENDPOINT=$(aws cloudformation describe-stacks \
          --stack-name $STACK_NAME \
          --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
          --output text 2>/dev/null || echo "")
        
        if [ -z "$API_ENDPOINT" ]; then
          echo "WARNING: Could not fetch API endpoint from stack $STACK_NAME"
          echo "Stack may not exist yet or API Gateway module not deployed"
          echo "Skipping API tests"
          exit 0
        fi
        
        echo "API Endpoint: $API_ENDPOINT"
        export API_ENDPOINT

  build:
    commands:
      - echo "==> Running API tests..."
      - |
        if [ -z "$API_ENDPOINT" ]; then
          echo "No API endpoint available, skipping tests"
          exit 0
        fi
        
        # Create test script
        cat > /tmp/test_api.py << 'TEST_SCRIPT'
        import os
        import sys
        import requests
        import pytest
        import json

        API_ENDPOINT = os.environ.get('API_ENDPOINT', '')

        class TestAPIEndpoints:
            """Test suite for API endpoints"""
            
            def test_api_endpoint_exists(self):
                """Verify API endpoint is configured"""
                assert API_ENDPOINT, "API_ENDPOINT environment variable not set"
                assert API_ENDPOINT.startswith('https://'), "API endpoint should use HTTPS"
            
            def test_health_check(self):
                """Test health check endpoint if available"""
                try:
                    response = requests.get(f"{API_ENDPOINT}/health", timeout=10)
                    assert response.status_code in [200, 404], f"Unexpected status code: {response.status_code}"
                    print(f"Health check status: {response.status_code}")
                except requests.exceptions.RequestException as e:
                    pytest.skip(f"Health endpoint not available: {e}")
            
            def test_api_responds(self):
                """Test that API responds to requests"""
                try:
                    response = requests.get(API_ENDPOINT, timeout=10)
                    assert response.status_code in [200, 403, 404], f"API not responding properly: {response.status_code}"
                    print(f"API response status: {response.status_code}")
                except requests.exceptions.RequestException as e:
                    pytest.fail(f"API not accessible: {e}")
            
            def test_cors_headers(self):
                """Test CORS headers if configured"""
                try:
                    response = requests.options(API_ENDPOINT, timeout=10)
                    print(f"CORS preflight status: {response.status_code}")
                    if 'Access-Control-Allow-Origin' in response.headers:
                        print(f"CORS enabled: {response.headers['Access-Control-Allow-Origin']}")
                except requests.exceptions.RequestException as e:
                    pytest.skip(f"CORS test skipped: {e}")
            
            def test_api_gateway_headers(self):
                """Verify API Gateway headers are present"""
                try:
                    response = requests.get(API_ENDPOINT, timeout=10)
                    headers = response.headers
                    
                    # Check for common API Gateway headers
                    assert 'x-amzn-RequestId' in headers or 'x-amzn-requestid' in headers, \
                        "Missing API Gateway request ID header"
                    
                    print("API Gateway headers verified")
                except requests.exceptions.RequestException as e:
                    pytest.fail(f"Failed to verify headers: {e}")

        if __name__ == '__main__':
            # Run tests with pytest
            exit_code = pytest.main([
                __file__,
                '-v',
                '--tb=short',
                '--html=/tmp/api-test-report.html',
                '--self-contained-html'
            ])
            sys.exit(exit_code)
        TEST_SCRIPT
        
        # Run the tests
        python3 /tmp/test_api.py

  post_build:
    commands:
      - echo "==> API tests complete"
      - |
        if [ $CODEBUILD_BUILD_SUCCEEDING -eq 1 ]; then
          echo "✓ All API tests passed"
        else
          echo "✗ Some API tests failed"
          exit 1
        fi

reports:
  api-tests:
    files:
      - '/tmp/api-test-report.html'
    file-format: 'JUNITXML'

artifacts:
  files:
    - /tmp/api-test-report.html
  name: ApiTestResults

