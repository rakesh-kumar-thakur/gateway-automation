version: 0.2

# ============================================================================
# Load Testing BuildSpec - Performance and stress tests
# ============================================================================
# This buildspec runs load tests to verify:
# - System handles expected load
# - Response times under load
# - Resource utilization
# - Scalability characteristics

env:
  variables:
    ENVIRONMENT: "dev"
    LOAD_TEST_DURATION: "60"  # seconds
    LOAD_TEST_USERS: "10"     # concurrent users
    LOAD_TEST_REQUESTS: "100" # total requests

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "==> Installing load testing tools..."
      - pip install --quiet locust requests boto3 pytest

  pre_build:
    commands:
      - echo "==> Environment $ENVIRONMENT"
      - echo "==> Load test configuration:"
      - echo "    Duration: ${LOAD_TEST_DURATION}s"
      - echo "    Concurrent users: $LOAD_TEST_USERS"
      - echo "    Total requests: $LOAD_TEST_REQUESTS"
      - |
        # Fetch API endpoint
        API_STACK="${ENVIRONMENT}-api-gateway-stack"
        API_ENDPOINT=$(aws cloudformation describe-stacks \
          --stack-name $API_STACK \
          --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
          --output text 2>/dev/null || echo "")
        
        if [ -z "$API_ENDPOINT" ]; then
          echo "WARNING: API endpoint not found, skipping load tests"
          exit 0
        fi
        
        echo "Target endpoint: $API_ENDPOINT"
        export API_ENDPOINT

  build:
    commands:
      - echo "==> Running load tests..."
      - |
        if [ -z "$API_ENDPOINT" ]; then
          echo "No API endpoint available, skipping load tests"
          exit 0
        fi
        
        # Create Locust load test script
        cat > /tmp/locustfile.py << 'LOCUST_SCRIPT'
        from locust import HttpUser, task, between
        import os

        class APIUser(HttpUser):
            """Simulated user for load testing"""
            wait_time = between(1, 3)  # Wait 1-3 seconds between requests
            
            @task(3)
            def get_root(self):
                """Test root endpoint (higher weight)"""
                self.client.get("/", name="GET /")
            
            @task(1)
            def get_health(self):
                """Test health endpoint if available"""
                with self.client.get("/health", catch_response=True, name="GET /health") as response:
                    if response.status_code == 404:
                        response.success()  # 404 is acceptable if health endpoint doesn't exist
        LOCUST_SCRIPT
        
        # Create load test runner script
        cat > /tmp/run_load_test.py << 'TEST_SCRIPT'
        import os
        import sys
        import subprocess
        import json
        import time
        from datetime import datetime

        API_ENDPOINT = os.environ.get('API_ENDPOINT', '')
        DURATION = int(os.environ.get('LOAD_TEST_DURATION', '60'))
        USERS = int(os.environ.get('LOAD_TEST_USERS', '10'))
        REQUESTS = int(os.environ.get('LOAD_TEST_REQUESTS', '100'))

        def run_load_test():
            """Run Locust load test in headless mode"""
            print(f"Starting load test against: {API_ENDPOINT}")
            print(f"Configuration: {USERS} users, {REQUESTS} requests, {DURATION}s duration")
            
            # Run Locust in headless mode
            cmd = [
                'locust',
                '-f', '/tmp/locustfile.py',
                '--headless',
                '--host', API_ENDPOINT,
                '--users', str(USERS),
                '--spawn-rate', str(max(1, USERS // 10)),
                '--run-time', f'{DURATION}s',
                '--html', '/tmp/load-test-report.html',
                '--csv', '/tmp/load-test-results'
            ]
            
            try:
                result = subprocess.run(cmd, capture_output=True, text=True, timeout=DURATION + 30)
                print(result.stdout)
                
                if result.returncode != 0:
                    print(f"Load test failed with exit code {result.returncode}")
                    print(result.stderr)
                    return False
                
                # Parse results
                analyze_results()
                return True
                
            except subprocess.TimeoutExpired:
                print("Load test timed out")
                return False
            except Exception as e:
                print(f"Error running load test: {e}")
                return False

        def analyze_results():
            """Analyze load test results and check thresholds"""
            print("\n" + "="*80)
            print("Load Test Results Analysis")
            print("="*80)
            
            try:
                # Read stats file
                with open('/tmp/load-test-results_stats.csv', 'r') as f:
                    lines = f.readlines()
                
                if len(lines) < 2:
                    print("No results to analyze")
                    return
                
                # Parse aggregated stats (last line before "Aggregated")
                for line in lines[1:]:
                    if line.startswith('Aggregated'):
                        parts = line.split(',')
                        if len(parts) >= 8:
                            method = parts[0]
                            name = parts[1]
                            requests = parts[2]
                            failures = parts[3]
                            median = parts[4]
                            p95 = parts[5]
                            p99 = parts[6]
                            avg = parts[7]
                            
                            print(f"\nAggregated Results:")
                            print(f"  Total Requests: {requests}")
                            print(f"  Failures: {failures}")
                            print(f"  Median Response Time: {median}ms")
                            print(f"  95th Percentile: {p95}ms")
                            print(f"  99th Percentile: {p99}ms")
                            print(f"  Average Response Time: {avg}ms")
                            
                            # Check thresholds
                            failure_rate = float(failures) / float(requests) if float(requests) > 0 else 0
                            
                            print(f"\nThreshold Checks:")
                            if failure_rate > 0.05:  # 5% failure threshold
                                print(f"  ✗ Failure rate too high: {failure_rate*100:.2f}%")
                            else:
                                print(f"  ✓ Failure rate acceptable: {failure_rate*100:.2f}%")
                            
                            if float(p95) > 2000:  # 2 second p95 threshold
                                print(f"  ✗ P95 response time too high: {p95}ms")
                            else:
                                print(f"  ✓ P95 response time acceptable: {p95}ms")
                
            except FileNotFoundError:
                print("Results file not found")
            except Exception as e:
                print(f"Error analyzing results: {e}")

        if __name__ == '__main__':
            success = run_load_test()
            sys.exit(0 if success else 1)
        TEST_SCRIPT
        
        # Run the load test
        python3 /tmp/run_load_test.py

  post_build:
    commands:
      - echo "==> Load tests complete"
      - |
        if [ $CODEBUILD_BUILD_SUCCEEDING -eq 1 ]; then
          echo "✓ Load tests passed"
        else
          echo "✗ Load tests failed"
          exit 1
        fi

reports:
  load-tests:
    files:
      - '/tmp/load-test-report.html'
    file-format: 'JUNITXML'

artifacts:
  files:
    - /tmp/load-test-report.html
    - /tmp/load-test-results*.csv
  name: LoadTestResults

