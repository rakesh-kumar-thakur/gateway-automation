version: 0.2

# ============================================================================
# Integration Testing BuildSpec - End-to-end integration tests
# ============================================================================
# This buildspec runs integration tests to verify:
# - Multiple services work together correctly
# - Data flows between components
# - External integrations function properly
# - Database connections work

env:
  variables:
    ENVIRONMENT: "dev"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "==> Installing test dependencies..."
      - pip install --quiet requests pytest pytest-html boto3

  pre_build:
    commands:
      - echo "==> Environment $ENVIRONMENT"
      - echo "==> Fetching stack outputs for integration testing..."
      - |
        # Fetch API Gateway endpoint
        API_STACK="${ENVIRONMENT}-api-gateway-stack"
        API_ENDPOINT=$(aws cloudformation describe-stacks \
          --stack-name $API_STACK \
          --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
          --output text 2>/dev/null || echo "")
        
        # Fetch ALB endpoint if exists
        ALB_STACK="${ENVIRONMENT}-alb-stack"
        ALB_ENDPOINT=$(aws cloudformation describe-stacks \
          --stack-name $ALB_STACK \
          --query "Stacks[0].Outputs[?OutputKey=='LoadBalancerDNS'].OutputValue" \
          --output text 2>/dev/null || echo "")
        
        echo "API Endpoint: ${API_ENDPOINT:-Not deployed}"
        echo "ALB Endpoint: ${ALB_ENDPOINT:-Not deployed}"
        
        export API_ENDPOINT
        export ALB_ENDPOINT

  build:
    commands:
      - echo "==> Running integration tests..."
      - |
        # Create integration test script
        cat > /tmp/test_integration.py << 'TEST_SCRIPT'
        import os
        import sys
        import requests
        import pytest
        import json
        import time

        API_ENDPOINT = os.environ.get('API_ENDPOINT', '')
        ALB_ENDPOINT = os.environ.get('ALB_ENDPOINT', '')

        class TestIntegration:
            """Integration test suite"""
            
            def test_environment_configured(self):
                """Verify test environment is properly configured"""
                assert os.environ.get('ENVIRONMENT'), "ENVIRONMENT not set"
                print(f"Testing environment: {os.environ.get('ENVIRONMENT')}")
            
            @pytest.mark.skipif(not API_ENDPOINT, reason="API Gateway not deployed")
            def test_api_gateway_integration(self):
                """Test API Gateway integration"""
                print(f"Testing API Gateway: {API_ENDPOINT}")
                
                try:
                    response = requests.get(API_ENDPOINT, timeout=10)
                    assert response.status_code in [200, 403, 404], \
                        f"Unexpected API response: {response.status_code}"
                    
                    # Verify response format
                    if response.status_code == 200:
                        assert response.headers.get('content-type'), "Missing content-type header"
                    
                    print(f"✓ API Gateway responding: {response.status_code}")
                except requests.exceptions.RequestException as e:
                    pytest.fail(f"API Gateway integration failed: {e}")
            
            @pytest.mark.skipif(not ALB_ENDPOINT, reason="ALB not deployed")
            def test_alb_integration(self):
                """Test Application Load Balancer integration"""
                print(f"Testing ALB: {ALB_ENDPOINT}")
                
                try:
                    response = requests.get(f"http://{ALB_ENDPOINT}", timeout=10)
                    assert response.status_code in [200, 503, 504], \
                        f"Unexpected ALB response: {response.status_code}"
                    
                    print(f"✓ ALB responding: {response.status_code}")
                except requests.exceptions.RequestException as e:
                    pytest.fail(f"ALB integration failed: {e}")
            
            @pytest.mark.skipif(not API_ENDPOINT or not ALB_ENDPOINT, 
                              reason="Both API and ALB required")
            def test_api_to_alb_integration(self):
                """Test integration between API Gateway and ALB"""
                print("Testing API Gateway -> ALB integration")
                
                # This is a placeholder for actual integration testing
                # In a real scenario, you would:
                # 1. Make a request to API Gateway
                # 2. Verify it properly routes to ALB
                # 3. Check response consistency
                
                pytest.skip("Integration path not configured yet")
            
            def test_aws_service_connectivity(self):
                """Test connectivity to AWS services"""
                import boto3
                
                try:
                    # Test CloudFormation access
                    cfn = boto3.client('cloudformation')
                    stacks = cfn.list_stacks(StackStatusFilter=['CREATE_COMPLETE', 'UPDATE_COMPLETE'])
                    assert stacks, "Could not list CloudFormation stacks"
                    
                    print(f"✓ AWS service connectivity verified")
                except Exception as e:
                    pytest.fail(f"AWS service connectivity failed: {e}")
            
            def test_cross_service_timing(self):
                """Test response times across services"""
                if not API_ENDPOINT:
                    pytest.skip("API endpoint not available")
                
                try:
                    start = time.time()
                    response = requests.get(API_ENDPOINT, timeout=10)
                    duration = time.time() - start
                    
                    # Response should be reasonably fast
                    assert duration < 5.0, f"Response too slow: {duration:.2f}s"
                    
                    print(f"✓ Response time: {duration:.3f}s")
                except requests.exceptions.RequestException as e:
                    pytest.fail(f"Timing test failed: {e}")

        if __name__ == '__main__':
            # Run tests with pytest
            exit_code = pytest.main([
                __file__,
                '-v',
                '--tb=short',
                '--html=/tmp/integration-test-report.html',
                '--self-contained-html'
            ])
            sys.exit(exit_code)
        TEST_SCRIPT
        
        # Run the tests
        python3 /tmp/test_integration.py

  post_build:
    commands:
      - echo "==> Integration tests complete"
      - |
        if [ $CODEBUILD_BUILD_SUCCEEDING -eq 1 ]; then
          echo "✓ All integration tests passed"
        else
          echo "✗ Some integration tests failed"
          exit 1
        fi

reports:
  integration-tests:
    files:
      - '/tmp/integration-test-report.html'
    file-format: 'JUNITXML'

artifacts:
  files:
    - /tmp/integration-test-report.html
  name: IntegrationTestResults

