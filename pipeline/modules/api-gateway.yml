# ============================================================
# API Gateway Module Manifest
# ============================================================

module:
  name: api-gateway
  description: REST API Gateway - endpoints defined in swagger.yaml
  enabled: true

stack:
  name: api-gateway-stack
  templatePath: aws/api-gateway/template.yaml
  capabilities:
    - CAPABILITY_NAMED_IAM

preDeploy: ~

parameters:
  - key: Environment
    source: value
    value: dev
  - key: StageName
    source: value
    value: dev
  - key: ApiName
    source: value
    value: dev-api-gateway

tags:
  - key: ManagedBy
    value: CodePipeline
  - key: Module
    value: api-gateway

# Pipeline auto-triggers when these paths change
changePaths:
  - aws/api-gateway/**
  - pipeline/modules/api-gateway.yml

