# ============================================================
# API Gateway Module Manifest
# Informational only - buildspec.yml handles the actual deploy.
# ============================================================

module:
  name: api-gateway
  description: REST API Gateway - endpoints defined in swagger.yaml
  enabled: true

stack:
  name: api-gateway-stack
  templatePath: aws/api-gateway/template.yaml

# To add a new endpoint:
#   1. Edit aws/api-gateway/swagger.yaml
#   2. Push to master
#   3. Pipeline auto-triggers and deploys
