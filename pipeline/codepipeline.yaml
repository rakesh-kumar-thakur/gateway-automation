AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Generic CodePipeline orchestrator.
  Watches GitHub for changes and deploys any module under aws/*
  whose changePaths are matched. Add new modules by dropping a
  manifest in pipeline/modules/ - no changes needed here.

Parameters:
  GitHubOwner:
    Type: String
  GitHubRepo:
    Type: String
  GitHubBranch:
    Type: String
    Default: master
  GitHubConnectionArn:
    Type: String
    Description: ARN of the CodeStar Connection to GitHub
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

  # ── Module-level params stored in SSM, consumed by deploy_module.py ──
  # Add a new SSM param here for each new module that needs config.
  ApiStageName:
    Type: String
    Default: v1
  ApiName:
    Type: String
    Default: my-api

Resources:

  # ── Artifact bucket ──────────────────────────────────────────────────────
  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${AWS::AccountId}-${Environment}-pipeline-artifacts"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 30

  # ── SSM Parameters ───────────────────────────────────────────────────────
  # Shared / pipeline-level
  SSMEnvironment:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /pipeline/environment
      Type: String
      Value: !Ref Environment

  SSMArtifactBucket:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /pipeline/artifact_bucket
      Type: String
      Value: !Ref ArtifactBucket
      Description: "Kept for reference - value is injected directly into CodeBuild env vars"

  # api-gateway module params
  SSMApiStageName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /pipeline/stage_name
      Type: String
      Value: !Ref ApiStageName

  SSMApiName:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /pipeline/api_name
      Type: String
      Value: !Ref ApiName

  # ── IAM: CodeBuild ───────────────────────────────────────────────────────
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-codebuild-deploy-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Logs
                Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"

              - Sid: Artifacts
                Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:GetBucketVersioning]
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"

              - Sid: CloudFormation
                Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                Resource: "*"

              - Sid: IAMPassthrough
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:PassRole
                  - iam:TagRole
                Resource: "*"

              # Broad service permissions - each module only uses what it needs
              - Sid: AllAWSServices
                Effect: Allow
                Action:
                  - lambda:*
                  - apigateway:*
                  - elasticloadbalancing:*
                  - ecs:*
                  - ec2:Describe*
                  - ec2:CreateSecurityGroup
                  - ec2:AuthorizeSecurityGroupIngress
                Resource: "*"

              - Sid: SSM
                Effect: Allow
                Action: [ssm:GetParameter, ssm:GetParameters]
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pipeline/*"

  # ── IAM: CodePipeline ────────────────────────────────────────────────────
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-codepipeline-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:GetBucketVersioning]
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action: [codebuild:BatchGetBuilds, codebuild:StartBuild]
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                  - codeconnections:UseConnection
                Resource: !Ref GitHubConnectionArn
              - Effect: Allow
                Action:
                  - events:PutRule
                  - events:PutTargets
                  - events:DeleteRule
                  - events:RemoveTargets
                  - events:DescribeRule
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/*"

  # ── CodeBuild project ────────────────────────────────────────────────────
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${Environment}-infra-deploy"
      Description: >
        Generic infra deployer. Detects changed modules and deploys them.
        Override DEPLOY_MODULES env var to target a specific module.
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: ARTIFACT_BUCKET
            Value: !Ref ArtifactBucket
          # Leave empty by default - set at build-time to force a specific module
          - Name: DEPLOY_MODULES
            Value: ""
      Source:
        Type: CODEPIPELINE
        BuildSpec: pipeline/buildspec.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Sub "/aws/codebuild/${Environment}-infra-deploy"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── IAM: EventBridge → CodePipeline ─────────────────────────────────────
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-eventbridge-pipeline-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: StartPipelineExecution
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Environment}-infra-pipeline"

  # ── EventBridge rule: GitHub push on tracked branch → trigger pipeline ───
  PipelineTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Environment}-infra-pipeline-trigger"
      Description: Triggers the infra pipeline on push to the tracked branch
      State: ENABLED
      EventPattern:
        source:
          - aws.codeconnections
        detail-type:
          - CodeConnections Repository State Change
        detail:
          event:
            - referenceUpdated
            - referenceCreated
          referenceName:
            - !Ref GitHubBranch
          referenceType:
            - branch
          repositoryName:
            - !Ref GitHubRepo
      Targets:
        - Id: TriggerPipeline
          Arn: !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:${Environment}-infra-pipeline"
          RoleArn: !GetAtt EventBridgeRole.Arn

  # ── CodePipeline ─────────────────────────────────────────────────────────
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "${Environment}-infra-pipeline"
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:

        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Sub "${GitHubOwner}/${GitHubRepo}"
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
                DetectChanges: true
              OutputArtifacts:
                - Name: SourceArtifact

        - Name: Deploy
          Actions:
            - Name: DeployModules
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuildArtifact

      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── CloudWatch alarm on pipeline failure ─────────────────────────────────
  PipelineFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${Environment}-infra-pipeline-failure"
      AlarmDescription: Fires when any infra pipeline execution fails
      Namespace: AWS/CodePipeline
      MetricName: FailedPipelines
      Dimensions:
        - Name: PipelineName
          Value: !Ref Pipeline
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  PipelineName:
    Value: !Ref Pipeline

  PipelineConsoleUrl:
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/${Pipeline}/view"

  ArtifactBucket:
    Value: !Ref ArtifactBucket
    Export:
      Name: !Sub "${Environment}-PipelineArtifactBucket"
